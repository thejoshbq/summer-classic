<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Summer Classic Standings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 15px;
      background: #f5f5f5;
      color: #1a1a1a;
      padding: 24px;
      max-width: 760px;
      margin: 0 auto;
    }

    h1 { font-size: 22px; margin-bottom: 24px; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #333; }

    .section {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    label { font-size: 13px; font-weight: 500; color: #555; display: block; margin-bottom: 4px; }

    input[type="text"],
    input[type="number"] {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 7px 10px;
      font-size: 14px;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="number"]:focus { border-color: #196A73; }

    button {
      padding: 7px 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }

    .btn-primary { background: #196A73; color: #fff; }
    .btn-primary:hover { background: #145960; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-secondary { background: #e8e8e8; color: #333; }
    .btn-secondary:hover { background: #d8d8d8; }

    .day-row { display: flex; align-items: flex-end; gap: 12px; }
    .day-row input { width: 80px; }

    /* Team table */
    #teams-list { display: flex; flex-direction: column; gap: 10px; }

    .team-entry {
      display: grid;
      grid-template-columns: 1fr 70px 70px 90px auto auto;
      gap: 8px;
      align-items: end;
    }

    .team-entry .pts-display {
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 7px 10px;
      font-size: 14px;
      color: #555;
      text-align: center;
    }

    .add-team-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }

    .add-team-row input { flex: 1; }

    .display-link {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .display-link a {
      color: #196A73;
      font-weight: 500;
      text-decoration: none;
    }

    .display-link a:hover { text-decoration: underline; }

    .flash {
      font-size: 13px;
      color: #196A73;
      opacity: 0;
      transition: opacity 0.3s;
      margin-left: 8px;
    }

    .flash.show { opacity: 1; }

    @media (max-width: 600px) {
      .team-entry {
        grid-template-columns: 1fr 60px 60px 70px auto auto;
        gap: 5px;
      }
    }
  </style>
</head>
<body>
  <h1>Summer Classic — Admin</h1>

  <div class="section">
    <h2>Display</h2>
    <div class="display-link">
      <a href="/display" target="_blank">Open standings board</a>
      <button class="btn-secondary" onclick="loadData()">Refresh admin</button>
    </div>
  </div>

  <div class="section">
    <h2>Current Day</h2>
    <div class="day-row">
      <div>
        <label for="day-input">Day (1–6)</label>
        <input type="number" id="day-input" min="1" max="6" value="1">
      </div>
      <button class="btn-primary" onclick="saveDay()">Save</button>
      <span class="flash" id="day-flash">Saved</span>
    </div>
  </div>

  <div class="section">
    <h2>Teams</h2>
    <div id="teams-list"></div>
    <div class="add-team-row">
      <div style="flex:1">
        <label for="new-team-name">New team name</label>
        <input type="text" id="new-team-name" placeholder="Team name">
      </div>
      <button class="btn-primary" onclick="addTeam()">Add Team</button>
    </div>
  </div>

  <script>
    let currentTeams = [];

    async function loadData() {
      const data = await fetch('/api/standings').then(r => r.json());
      document.getElementById('day-input').value = data.day;
      currentTeams = data.teams;
      renderTeams(data.teams);
    }

    function renderTeams(teams) {
      const list = document.getElementById('teams-list');
      list.innerHTML = '';

      if (teams.length === 0) {
        list.innerHTML = '<p style="color:#888;font-size:14px">No teams yet. Add one below.</p>';
        return;
      }

      teams.forEach(team => {
        const entry = document.createElement('div');
        entry.className = 'team-entry';
        entry.innerHTML = `
          <div>
            <label>Team name</label>
            <input type="text" id="name-${team.id}" value="${escHtml(team.name)}">
          </div>
          <div>
            <label>W</label>
            <input type="number" id="w-${team.id}" min="0" value="${team.w}" oninput="updatePts('${team.id}')">
          </div>
          <div>
            <label>L</label>
            <input type="number" id="l-${team.id}" min="0" value="${team.l}" oninput="updatePts('${team.id}')">
          </div>
          <div>
            <label>Points</label>
            <div class="pts-display" id="pts-${team.id}">${team.points}</div>
          </div>
          <div style="display:flex;flex-direction:column;justify-content:flex-end">
            <label>&nbsp;</label>
            <button class="btn-primary" onclick="saveTeam('${team.id}')">Save</button>
          </div>
          <div style="display:flex;flex-direction:column;justify-content:flex-end">
            <label>&nbsp;</label>
            <button class="btn-danger" onclick="deleteTeam('${team.id}')">Delete</button>
          </div>
        `;
        list.appendChild(entry);
      });
    }

    function updatePts(id) {
      const w = Math.max(0, parseInt(document.getElementById('w-' + id).value) || 0);
      document.getElementById('pts-' + id).textContent = w * 3;
    }

    async function saveDay() {
      const day = parseInt(document.getElementById('day-input').value);
      await fetch('/api/standings/day', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ day })
      });
      flash('day-flash');
    }

    async function saveTeam(id) {
      const name = document.getElementById('name-' + id).value.trim();
      const w = Math.max(0, parseInt(document.getElementById('w-' + id).value) || 0);
      const l = Math.max(0, parseInt(document.getElementById('l-' + id).value) || 0);
      const data = await fetch('/api/standings/teams/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, w, l })
      }).then(r => r.json());
      currentTeams = data.teams;
      renderTeams(data.teams);
    }

    async function deleteTeam(id) {
      if (!confirm('Delete this team?')) return;
      const data = await fetch('/api/standings/teams/' + id, { method: 'DELETE' }).then(r => r.json());
      currentTeams = data.teams;
      renderTeams(data.teams);
    }

    async function addTeam() {
      const nameEl = document.getElementById('new-team-name');
      const name = nameEl.value.trim();
      if (!name) { nameEl.focus(); return; }
      const data = await fetch('/api/standings/teams', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      }).then(r => r.json());
      nameEl.value = '';
      currentTeams = data.teams;
      renderTeams(data.teams);
    }

    function flash(id) {
      const el = document.getElementById(id);
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1500);
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadData();
  </script>
</body>
</html>
