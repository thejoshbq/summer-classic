<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Summer Classic — Championship Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
  }

  #scoreboard {
    width: min(1600px, 96vw);
    background: #114566;
    border-radius: 12px;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: #0d3650;
    border-bottom: 3px solid #F28F16;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-venue {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    color: #196A73;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .header-title {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #F28F16;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header-sub {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* INNING BADGE (live) */
  .badge-inning {
    background: #196A73;
    border-radius: 8px;
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    min-width: 80px;
  }
  .badge-inning-label {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .badge-inning-half {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
  }
  .badge-inning-num {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }

  /* FINAL BADGE */
  .badge-final {
    background: #BF0606;
    border-radius: 8px;
    padding: 10px 20px;
  }
  .badge-final-text {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* LINE SCORE */
  .linescore-wrap { padding: 16px 24px 0; }

  table.linescore {
    width: 100%;
    table-layout: fixed;
    border-collapse: collapse;
  }
  table.linescore col.col-name { width: 130px; }
  table.linescore col.col-total { width: 52px; }

  table.linescore thead tr {
    border-bottom: 1px solid rgba(25,106,115,0.4);
  }
  table.linescore thead th {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: #196A73;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 6px 6px;
    text-align: center;
  }
  table.linescore thead th.col-name { text-align: left; }
  table.linescore thead th.col-total { color: #F28F16; }

  table.linescore tbody tr {
    border-bottom: 1px solid rgba(25,106,115,0.15);
  }
  table.linescore tbody tr:last-child { border-bottom: none; }

  table.linescore tbody td {
    padding: 10px 6px;
    text-align: center;
  }
  table.linescore tbody td.col-name {
    text-align: left;
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #fff;
  }
  table.linescore tbody td.col-name.winner { color: #F28F16; }

  .cell-score {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
  }
  .cell-score.active {
    color: #F25C05;
    font-weight: 700;
  }
  .cell-score.empty {
    color: rgba(255,255,255,0.2);
  }

  .cell-total {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
  }
  .cell-total.winner { color: #F28F16; }
  .cell-total.loser  { color: rgba(255,255,255,0.5); }

  /* LOWER PANEL */
  .lower-panel {
    padding: 14px 24px 16px;
    display: flex;
    gap: 16px;
    align-items: stretch;
  }

  .v-divider {
    width: 1px;
    background: rgba(25,106,115,0.3);
    flex-shrink: 0;
  }

  /* AT-BAT BLOCK */
  .atbat-block {
    flex: 1;
    background: #0d3650;
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .atbat-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
  }
  .atbat-row + .atbat-row {
    border-top: 1px solid rgba(25,106,115,0.2);
  }
  .atbat-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    color: #196A73;
    letter-spacing: 2px;
    text-transform: uppercase;
    min-width: 52px;
  }
  .atbat-name {
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* DIAMOND */
  .diamond-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 8px;
  }
  .diamond-field {
    position: relative;
    width: 64px;
    height: 64px;
    flex-shrink: 0;
  }
  .base {
    position: absolute;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 2px;
    transform: rotate(45deg);
    background: transparent;
  }
  .base.occupied {
    background: #F28F16;
    border-color: #F28F16;
  }
  .base-2nd { top: 2px; left: 22px; }
  .base-1st { top: 22px; right: 2px; }
  .base-3rd { top: 22px; left: 2px; }
  .base-home {
    position: absolute;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 2px;
    transform: rotate(45deg);
    background: rgba(255,255,255,0.05);
    bottom: 2px;
    left: 25px;
  }

  /* OUTS/BALLS */
  .counts-panel {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 10px;
    padding: 0 8px;
  }
  .count-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .count-label {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    color: #196A73;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    min-width: 28px;
    text-align: right;
  }
  .dots {
    display: flex;
    gap: 5px;
  }
  .dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.2);
    background: transparent;
  }
  .dot.out-active  { background: #F25C05; border-color: #F25C05; }
  .dot.ball-active { background: #196A73; border-color: #196A73; }

  /* FINAL LOWER PANEL */
  .winner-block {
    flex: 1;
    background: #0d3650;
    padding: 14px 20px;
    border-left: 3px solid #F28F16;
    border-radius: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    justify-content: center;
  }
  .winner-champ-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    color: #196A73;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .winner-team-name {
    font-family: 'Oswald', sans-serif;
    font-size: 30px;
    font-weight: 700;
    color: #F28F16;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .winner-subline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .final-score-block {
    background: #0d3650;
    border-radius: 8px;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .final-score-team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .final-score-abbr {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .final-score-runs {
    font-family: 'Oswald', sans-serif;
    font-size: 44px;
    font-weight: 700;
    line-height: 1;
  }
  .final-score-runs.winner-runs { color: #F28F16; }
  .final-score-runs.loser-runs  { color: rgba(255,255,255,0.25); }
  .final-score-sep {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: rgba(255,255,255,0.2);
    align-self: center;
  }

  /* FOOTER */
  .footer {
    background: #0d3650;
    border-top: 1px solid rgba(25,106,115,0.3);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-innings {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: #196A73;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-style: italic;
  }
  .footer-tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-style: italic;
  }

  /* SETUP STATE */
  .setup-state {
    padding: 48px 24px;
    text-align: center;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="scoreboard"></div>

<script>
const sb = document.getElementById('scoreboard');

function abbr(name) {
  if (!name) return '???';
  const words = name.trim().split(/\s+/);
  if (words.length === 1) return name.slice(0, 3).toUpperCase();
  return words.map(w => w[0]).join('').toUpperCase().slice(0, 4);
}

function renderHeader(g) {
  let badge = '';
  if (g.status === 'live') {
    badge = `
      <div class="badge-inning">
        <span class="badge-inning-label">Inning</span>
        <span class="badge-inning-half">${g.currentHalf === 'top' ? 'Top' : 'Bottom'}</span>
        <span class="badge-inning-num">${g.currentInning}</span>
      </div>`;
  } else if (g.status === 'final') {
    badge = `
      <div class="badge-final">
        <span class="badge-final-text">Final</span>
      </div>`;
  }
  return `
    <div class="header">
      <div class="header-left">
        <span class="header-venue">Lumber Jill's</span>
        <span class="header-title">The World Series</span>
        <span class="header-sub">Day 6 — Championship Game</span>
      </div>
      ${badge}
    </div>`;
}

function renderLineScore(g) {
  const cols = Math.max(9, g.currentInning);
  const teams = ['visitor', 'home'];

  let colDefs = `<col class="col-name">`;
  for (let i = 0; i < cols; i++) colDefs += `<col>`;
  colDefs += `<col class="col-total">`;

  let headCells = `<th class="col-name"></th>`;
  for (let i = 1; i <= cols; i++) headCells += `<th>${i}</th>`;
  headCells += `<th class="col-total">R</th>`;

  let rows = '';
  for (const team of teams) {
    const innings = g[team].innings;
    const isWinner = g.status === 'final' && g.winner === team;
    const isLoser  = g.status === 'final' && g.winner && g.winner !== team;
    const total    = team === 'visitor' ? g.visitorTotal : g.homeTotal;

    let cells = `<td class="col-name${isWinner ? ' winner' : ''}">${g[team].name || '&mdash;'}</td>`;

    for (let col = 0; col < cols; col++) {
      const isActive = g.status === 'live' &&
        ((team === 'visitor' && g.currentHalf === 'top'    && col === g.currentInning - 1) ||
         (team === 'home'    && g.currentHalf === 'bottom' && col === g.currentInning - 1));

      let cls = 'cell-score';
      let val = '';
      if (isActive) {
        cls += ' active';
        val = '&#9679;';
      } else if (col >= innings.length || innings[col] === null) {
        cls += ' empty';
        val = '&mdash;';
      } else {
        val = innings[col];
      }
      cells += `<td><span class="${cls}">${val}</span></td>`;
    }

    let totalCls = 'cell-total';
    if (isWinner) totalCls += ' winner';
    else if (isLoser) totalCls += ' loser';

    cells += `<td><span class="${totalCls}">${total}</span></td>`;
    rows += `<tr>${cells}</tr>`;
  }

  return `
    <div class="linescore-wrap">
      <table class="linescore">
        <colgroup>${colDefs}</colgroup>
        <thead><tr>${headCells}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderLowerLive(g) {
  const outDots = [0,1,2].map(i =>
    `<span class="dot${i < g.outs ? ' out-active' : ''}"></span>`).join('');
  const ballDots = [0,1,2,3].map(i =>
    `<span class="dot${i < g.balls ? ' ball-active' : ''}"></span>`).join('');

  const b = g.bases;
  return `
    <div class="lower-panel">
      <div class="atbat-block">
        <div class="atbat-row">
          <span class="atbat-label">Pitching</span>
          <span class="atbat-name">${g.pitcher || '&mdash;'}</span>
        </div>
        <div class="atbat-row">
          <span class="atbat-label">Batting</span>
          <span class="atbat-name">${g.batter || '&mdash;'}</span>
        </div>
      </div>
      <div class="v-divider"></div>
      <div class="diamond-wrap">
        <div class="diamond-field">
          <div class="base base-2nd${b.second ? ' occupied' : ''}"></div>
          <div class="base base-1st${b.first  ? ' occupied' : ''}"></div>
          <div class="base base-3rd${b.third  ? ' occupied' : ''}"></div>
          <div class="base-home"></div>
        </div>
      </div>
      <div class="v-divider"></div>
      <div class="counts-panel">
        <div class="count-row">
          <span class="count-label">Outs</span>
          <div class="dots">${outDots}</div>
        </div>
        <div class="count-row">
          <span class="count-label">Balls</span>
          <div class="dots">${ballDots}</div>
        </div>
      </div>
    </div>`;
}

function renderLowerFinal(g) {
  const winnerName = g.winner ? g[g.winner].name : '';
  const vClass = g.winner === 'visitor' ? 'winner-runs' : 'loser-runs';
  const hClass = g.winner === 'home'    ? 'winner-runs' : 'loser-runs';
  const vAbbr  = abbr(g.visitor.name);
  const hAbbr  = abbr(g.home.name);

  return `
    <div class="lower-panel">
      <div class="winner-block">
        <span class="winner-champ-label">Summer Classic Champions</span>
        <span class="winner-team-name">${winnerName || '&mdash;'}</span>
        <span class="winner-subline">The Summer Classic &mdash; Lumber Jill's</span>
      </div>
      <div class="v-divider"></div>
      <div class="final-score-block">
        <div class="final-score-team">
          <span class="final-score-abbr">${vAbbr}</span>
          <span class="final-score-runs ${vClass}">${g.visitorTotal}</span>
        </div>
        <span class="final-score-sep">&ndash;</span>
        <div class="final-score-team">
          <span class="final-score-abbr">${hAbbr}</span>
          <span class="final-score-runs ${hClass}">${g.homeTotal}</span>
        </div>
      </div>
    </div>`;
}

function renderFooter(g) {
  const tagline = `<span class="footer-tagline">Have fun. Build community. Give back.</span>`;
  if (g.status === 'final') {
    return `
      <div class="footer">
        <span class="footer-innings">${g.inningsPlayed} innings played</span>
        ${tagline}
      </div>`;
  }
  return `<div class="footer" style="justify-content:flex-end">${tagline}</div>`;
}

function render(g) {
  if (g.status === 'setup') {
    sb.innerHTML = `
      ${renderHeader(g)}
      <div class="setup-state">Waiting for game to start&hellip;</div>
      ${renderFooter(g)}`;
    return;
  }
  sb.innerHTML =
    renderHeader(g) +
    renderLineScore(g) +
    (g.status === 'live' ? renderLowerLive(g) : renderLowerFinal(g)) +
    renderFooter(g);
}

async function refresh() {
  try {
    const g = await fetch('/api/game').then(r => r.json());
    render(g);
  } catch (e) {
    console.error('Fetch failed', e);
  }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
