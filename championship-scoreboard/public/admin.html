<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scoreboard Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
    padding: 20px;
    font-size: 14px;
  }

  h1 { font-size: 18px; margin-bottom: 20px; color: #fff; }
  h2 { font-size: 14px; font-weight: 600; color: #aaa; text-transform: uppercase;
       letter-spacing: 1px; margin-bottom: 10px; margin-top: 0; }

  .section {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }

  label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }

  input[type="text"], input[type="number"], select {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 6px;
    color: #e0e0e0;
    padding: 10px 12px;
    font-size: 14px;
    width: 100%;
    min-height: 44px;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    outline: none;
    border-color: #F28F16;
  }

  button {
    background: #333;
    border: 1px solid #555;
    border-radius: 6px;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 14px;
    min-height: 44px;
    padding: 0 16px;
  }
  button:hover { background: #444; }
  button:active { background: #222; }

  .btn-primary {
    background: #F28F16;
    border-color: #F28F16;
    color: #000;
    font-weight: 700;
  }
  .btn-primary:hover { background: #e07d10; }

  .btn-danger {
    background: #7a1f1f;
    border-color: #7a1f1f;
    color: #fff;
  }
  .btn-danger:hover { background: #921f1f; }

  .btn-large {
    width: 100%;
    font-size: 16px;
    font-weight: 700;
    min-height: 52px;
    margin-top: 4px;
  }

  .row { display: flex; gap: 10px; align-items: flex-end; }
  .col { flex: 1; }

  /* Inning display */
  .inning-display {
    font-size: 28px;
    font-weight: 700;
    color: #F28F16;
    padding: 8px 0 12px;
  }
  .inning-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* Score grid */
  .score-grid { overflow-x: auto; }
  table.score-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 500px;
  }
  table.score-table th, table.score-table td {
    padding: 4px;
    text-align: center;
    font-size: 12px;
  }
  table.score-table th { color: #888; font-weight: 600; text-transform: uppercase; }
  table.score-table td.team-name { text-align: left; font-weight: 600; padding-right: 8px; min-width: 100px; }

  .score-cell { position: relative; }
  .score-cell input[type="number"] {
    width: 52px;
    min-height: 36px;
    padding: 4px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
  }
  .score-cell.active-cell input[type="number"] {
    border-color: #F28F16;
    background: #2d2000;
    min-height: 44px;
    font-size: 16px;
  }
  .score-cell .cell-btns { display: flex; gap: 2px; margin-top: 2px; justify-content: center; }
  .score-cell .cell-btns button {
    min-height: 28px;
    width: 24px;
    padding: 0;
    font-size: 16px;
    font-weight: 700;
  }
  .score-cell.active-cell .cell-btns button { min-height: 34px; width: 28px; }

  .total-cell { font-size: 18px; font-weight: 700; color: #F28F16; padding: 4px 8px; }

  /* At-bat panel */
  .atbat-grid { display: flex; gap: 16px; flex-wrap: wrap; }
  .atbat-col { flex: 1; min-width: 200px; }

  .bases-row { display: flex; gap: 8px; margin-top: 6px; }
  .base-btn {
    flex: 1;
    min-height: 48px;
    font-size: 14px;
    font-weight: 700;
  }
  .base-btn.occupied { background: #F28F16; border-color: #F28F16; color: #000; }

  .selector-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .sel-btn {
    min-height: 44px;
    min-width: 44px;
    font-size: 16px;
    font-weight: 700;
  }
  .sel-btn.active { background: #F28F16; border-color: #F28F16; color: #000; }

  /* Final state */
  .final-banner {
    background: #2d0a0a;
    border: 1px solid #BF0606;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    margin-bottom: 16px;
  }
  .final-banner h2 { color: #F28F16; font-size: 20px; margin-bottom: 4px; }
  .final-banner p { color: #888; }

  .status-bar {
    background: #1a1a1a;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: #666;
    margin-bottom: 12px;
    text-align: right;
  }
  .status-bar span { color: #4CAF50; font-weight: 600; }
</style>
</head>
<body>
<h1>Championship Scoreboard — Admin</h1>
<div class="status-bar">Auto-sync: <span id="sync-status">OK</span></div>
<div id="admin"></div>

<script>
let state = null;

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
}

async function load() {
  try {
    state = await api('GET', '/api/game');
    document.getElementById('sync-status').textContent = 'OK';
    renderAdmin(state);
  } catch(e) {
    document.getElementById('sync-status').textContent = 'Error';
  }
}

async function act(method, path, body) {
  state = await api(method, path, body);
  renderAdmin(state);
}

function renderAdmin(g) {
  const el = document.getElementById('admin');
  if (g.status === 'setup') {
    el.innerHTML = renderSetup();
  } else if (g.status === 'live') {
    el.innerHTML = renderLive(g);
    attachLiveHandlers(g);
  } else if (g.status === 'final') {
    el.innerHTML = renderFinal(g);
    attachFinalHandlers();
  }
}

/* ---- SETUP ---- */
function renderSetup() {
  return `
    <div class="section">
      <h2>Game Setup</h2>
      <div class="row">
        <div class="col">
          <label>Visitor Team Name</label>
          <input type="text" id="visitor-name" placeholder="e.g. The Hackers">
        </div>
        <div class="col">
          <label>Home Team Name</label>
          <input type="text" id="home-name" placeholder="e.g. Lumber Jill's">
        </div>
      </div>
      <button class="btn-primary btn-large" id="start-btn" style="margin-top:12px">Start Game</button>
    </div>`;
}

/* ---- LIVE ---- */
function renderLive(g) {
  const cols = Math.max(9, g.currentInning);
  const halfLabel = g.currentHalf === 'top' ? 'Top' : 'Bottom';

  // Inning management
  let inningOptions = '';
  for (let i = 1; i <= 12; i++) {
    inningOptions += `<option value="${i}"${g.currentInning === i ? ' selected' : ''}>${i}</option>`;
  }

  // Score grid
  let headCells = '<th class="team-name">Team</th>';
  for (let i = 1; i <= cols; i++) headCells += `<th>${i}</th>`;
  headCells += '<th>R</th>';

  function scoreRow(team, label, total) {
    let cells = `<td class="team-name">${label}</td>`;
    for (let col = 0; col < cols; col++) {
      const isActive = (team === 'visitor' && g.currentHalf === 'top'    && col === g.currentInning - 1) ||
                       (team === 'home'    && g.currentHalf === 'bottom' && col === g.currentInning - 1);
      const val = g[team].innings[col] !== undefined && g[team].innings[col] !== null ? g[team].innings[col] : '';
      cells += `
        <td class="score-cell${isActive ? ' active-cell' : ''}">
          <input type="number" min="0" value="${val}"
                 data-team="${team}" data-col="${col}"
                 id="inp-${team}-${col}">
          <div class="cell-btns">
            <button data-team="${team}" data-col="${col}" data-delta="-1">−</button>
            <button data-team="${team}" data-col="${col}" data-delta="1">+</button>
          </div>
        </td>`;
    }
    cells += `<td class="total-cell">${total}</td>`;
    return `<tr>${cells}</tr>`;
  }

  // Outs
  const outsHTML = [0,1,2].map(v =>
    `<button class="sel-btn${g.outs === v ? ' active' : ''}" data-type="outs" data-val="${v}">${v}</button>`
  ).join('');
  // Balls
  const ballsHTML = [0,1,2,3].map(v =>
    `<button class="sel-btn${g.balls === v ? ' active' : ''}" data-type="balls" data-val="${v}">${v}</button>`
  ).join('');

  const b = g.bases;

  return `
    <div class="section">
      <h2>Inning</h2>
      <div class="inning-display">${halfLabel} ${g.currentInning}</div>
      <button class="btn-primary btn-large" id="next-half-btn">Next Half &rarr;</button>
      <div class="inning-controls" style="margin-top:10px">
        <select id="inning-sel">${inningOptions}</select>
        <button class="sel-btn${g.currentHalf === 'top'    ? ' active' : ''}" id="half-top">Top</button>
        <button class="sel-btn${g.currentHalf === 'bottom' ? ' active' : ''}" id="half-bot">Bottom</button>
      </div>
    </div>

    <div class="section">
      <h2>Score</h2>
      <div class="score-grid">
        <table class="score-table">
          <thead><tr>${headCells}</tr></thead>
          <tbody>
            ${scoreRow('visitor', g.visitor.name || 'Visitor', g.visitorTotal)}
            ${scoreRow('home',    g.home.name    || 'Home',    g.homeTotal)}
          </tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <h2>At-Bat</h2>
      <div class="atbat-grid">
        <div class="atbat-col">
          <label>Pitcher</label>
          <input type="text" id="pitcher-inp" value="${g.pitcher || ''}">
          <label style="margin-top:10px">Batter</label>
          <input type="text" id="batter-inp" value="${g.batter || ''}">
        </div>
        <div class="atbat-col">
          <label>Bases</label>
          <div class="bases-row">
            <button class="base-btn${b.first  ? ' occupied' : ''}" data-base="first">1B</button>
            <button class="base-btn${b.second ? ' occupied' : ''}" data-base="second">2B</button>
            <button class="base-btn${b.third  ? ' occupied' : ''}" data-base="third">3B</button>
          </div>
          <label style="margin-top:10px">Outs</label>
          <div class="selector-row">${outsHTML}</div>
          <label style="margin-top:10px">Balls</label>
          <div class="selector-row">${ballsHTML}</div>
          <button id="clear-btn" style="margin-top:10px;width:100%;min-height:44px">
            Clear bases + reset count
          </button>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Game Actions</h2>
      <div class="row">
        <button class="btn-primary col" id="final-btn" style="min-height:52px;font-size:15px;font-weight:700">
          Declare Final
        </button>
        <button class="btn-danger col" id="reset-btn" style="min-height:52px">
          Reset Game
        </button>
      </div>
    </div>`;
}

/* ---- FINAL ---- */
function renderFinal(g) {
  const winner = g.winner ? g[g.winner].name : 'Tied';
  return `
    <div class="final-banner">
      <h2>&#127942; ${winner}</h2>
      <p>Final score: ${g.visitorTotal} &ndash; ${g.homeTotal}</p>
      <p style="margin-top:4px;font-size:12px;color:#666">${g.inningsPlayed} innings played</p>
    </div>
    <div class="section">
      <button class="btn-danger btn-large" id="reset-btn-final">Reset Game</button>
    </div>`;
}

/* ---- HANDLERS ---- */
function attachLiveHandlers(g) {

  // Setup start (shouldn't fire in live but just in case)
  document.getElementById('start-btn')?.addEventListener('click', async () => {
    const v = document.getElementById('visitor-name').value.trim();
    const h = document.getElementById('home-name').value.trim();
    if (!v || !h) { alert('Enter both team names.'); return; }
    await act('POST', '/api/game/setup', { visitorName: v, homeName: h });
  });

  // Next half
  document.getElementById('next-half-btn').addEventListener('click', async () => {
    let inning = g.currentInning;
    let half   = g.currentHalf;
    if (half === 'top') {
      half = 'bottom';
    } else {
      half = 'top';
      inning++;
    }
    await act('PUT', '/api/game/inning', { inning, half });
  });

  // Inning selector
  document.getElementById('inning-sel').addEventListener('change', async (e) => {
    await act('PUT', '/api/game/inning', { inning: parseInt(e.target.value), half: g.currentHalf });
  });

  // Half toggles
  document.getElementById('half-top').addEventListener('click', async () => {
    await act('PUT', '/api/game/inning', { inning: g.currentInning, half: 'top' });
  });
  document.getElementById('half-bot').addEventListener('click', async () => {
    await act('PUT', '/api/game/inning', { inning: g.currentInning, half: 'bottom' });
  });

  // Score inputs
  document.querySelectorAll('.score-table input[data-team]').forEach(inp => {
    inp.addEventListener('change', async () => {
      const team = inp.dataset.team;
      const col  = parseInt(inp.dataset.col);
      const runs = Math.max(0, parseInt(inp.value) || 0);
      inp.value = runs;
      await act('PUT', '/api/game/score', { team, inningIndex: col, runs });
    });
  });

  // Score +/- buttons
  document.querySelectorAll('.score-cell button[data-delta]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const team  = btn.dataset.team;
      const col   = parseInt(btn.dataset.col);
      const delta = parseInt(btn.dataset.delta);
      const inp   = document.getElementById(`inp-${team}-${col}`);
      const cur   = parseInt(inp.value) || 0;
      const runs  = Math.max(0, cur + delta);
      inp.value = runs;
      await act('PUT', '/api/game/score', { team, inningIndex: col, runs });
    });
  });

  // Pitcher / batter
  function nameBlurHandler(field, id) {
    document.getElementById(id)?.addEventListener('blur', async (e) => {
      await act('PUT', '/api/game/atbat', { [field]: e.target.value });
    });
    document.getElementById(id)?.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        e.target.blur();
      }
    });
  }
  nameBlurHandler('pitcher', 'pitcher-inp');
  nameBlurHandler('batter',  'batter-inp');

  // Base toggles
  document.querySelectorAll('.base-btn[data-base]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const base = btn.dataset.base;
      const newBases = { ...g.bases, [base]: !g.bases[base] };
      await act('PUT', '/api/game/atbat', { bases: newBases });
    });
  });

  // Outs / balls selectors
  document.querySelectorAll('.sel-btn[data-type]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.dataset.type;
      const val  = parseInt(btn.dataset.val);
      await act('PUT', '/api/game/atbat', { [type]: val });
    });
  });

  // Clear bases + reset count
  document.getElementById('clear-btn')?.addEventListener('click', async () => {
    await act('PUT', '/api/game/atbat', {
      bases: { first: false, second: false, third: false },
      outs: 0,
      balls: 0
    });
  });

  // Declare final
  document.getElementById('final-btn')?.addEventListener('click', async () => {
    if (!confirm('Declare this game final?')) return;
    await act('POST', '/api/game/final');
  });

  // Reset
  document.getElementById('reset-btn')?.addEventListener('click', async () => {
    if (!confirm('Reset the entire game? This cannot be undone.')) return;
    await act('POST', '/api/game/reset');
  });
}

function attachFinalHandlers() {
  document.getElementById('reset-btn-final')?.addEventListener('click', async () => {
    if (!confirm('Reset the entire game? This cannot be undone.')) return;
    await act('POST', '/api/game/reset');
  });
}

// Setup form handler (attached globally since it's rendered before state is live)
document.getElementById('admin').addEventListener('click', async (e) => {
  if (e.target.id === 'start-btn') {
    const v = document.getElementById('visitor-name')?.value.trim();
    const h = document.getElementById('home-name')?.value.trim();
    if (!v || !h) { alert('Enter both team names.'); return; }
    await act('POST', '/api/game/setup', { visitorName: v, homeName: h });
  }
});

load();
</script>
</body>
</html>
