<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bracket — Summer Classic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/brand.css">
<link rel="stylesheet" href="/shared/shell.css">
<style>
  .bracket-area {
    flex-direction: row;
    padding: 0;
    gap: 0;
    overflow: hidden;
  }

  /* MAIN PANEL */
  .bracket-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2% 2.4%;
    gap: 1.8%;
    min-width: 0;
  }

  .round-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(16px, 2vw, 30px);
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
  }
  .round-of {
    font-size: 0.55em;
    color: var(--teal);
    letter-spacing: 0.18em;
  }

  .heat-row {
    display: flex;
    gap: 1.4%;
    align-items: flex-start;
    justify-content: center;
    flex-wrap: wrap;
    width: 100%;
  }

  .card-block {
    background: var(--dark-navy);
    border: 1px solid var(--divider);
    border-radius: 6px;
    overflow: hidden;
    flex: 1 1 0;
    max-width: min(18vw, 240px);
    min-width: 110px;
  }
  .card-block.is-final { border: 2px solid var(--orange); }
  .card-block.is-bye { opacity: 0.5; }

  .card-header {
    background: rgba(25,106,115,0.25);
    color: var(--teal);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(8px, 0.75vw, 11px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.35em 0.7em;
    text-align: center;
  }
  .is-final .card-header { background: rgba(242,143,22,0.18); color: var(--orange); }

  .row {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--divider-faint);
    padding: 0.4em 0.6em;
    gap: 0.5em;
    min-height: 1.9em;
  }
  .row:last-child { border-bottom: none; }

  .seed {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(9px, 0.7vw, 11px);
    color: var(--teal);
    min-width: 1.4em;
    text-align: center;
  }

  .pname {
    flex: 1;
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: clamp(11px, 0.95vw, 14px);
    text-transform: uppercase;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pname.winner { color: var(--orange); font-weight: 700; }
  .pname.loser { color: var(--white-faint); text-decoration: line-through; }
  .pname.bye { color: var(--teal); font-style: italic; }
  .pname.tbd { color: rgba(255,255,255,0.2); }

  .score {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(11px, 0.95vw, 14px);
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    min-width: 1.2em;
    text-align: right;
  }
  .score.winner { color: var(--orange); }


  /* SIDEBAR */
  .bracket-sidebar {
    width: 22%;
    flex-shrink: 0;
    border-left: 1px solid var(--divider);
    padding: 2% 1.8%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .elim-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: clamp(11px, 1.1vw, 16px);
    color: var(--teal);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.6em;
  }
  .elim-section {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: clamp(9px, 0.8vw, 12px);
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    border-top: 1px solid var(--divider-faint);
    padding-top: 0.5em;
    margin-top: 0.5em;
  }
  .elim-section:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
  .elim-name {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(10px, 0.9vw, 13px);
    color: var(--white-faint);
    text-decoration: line-through;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.12em 0;
  }
  .elim-empty {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(10px, 0.9vw, 13px);
    color: var(--white-trace);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-style: italic;
  }

  /* CHAMPION STATE */
  .champion-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.4em;
  }
  .champ-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: clamp(12px, 1.3vw, 20px);
    color: var(--orange);
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .champ-name {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(28px, 5vw, 80px);
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .legend { display: flex; gap: 1em; align-items: center; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4em;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(9px, 0.85vw, 12px);
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .dot { width: 0.6em; height: 0.6em; border-radius: 50%; }
  .dot-orange { background: var(--orange); }
  .dot-muted { background: var(--white-faint); }
  .dot-teal { background: var(--teal); }
</style>
</head>
<body>
<div class="board">
  <header class="board-header">
    <div class="header-brand">
      <img src="/shared/logo.png" class="header-logo" alt="Lumber Jill's">
      <div class="header-left">
        <span class="venue-name">Lumber Jill's</span>
        <span class="board-title" id="mode-title">Bracket</span>
        <span class="board-subtitle" id="mode-subtitle">&nbsp;</span>
      </div>
    </div>
    <div class="day-badge">
      <span class="day-label">Day</span>
      <span class="day-number" id="day-num">—</span>
    </div>
  </header>

  <div class="board-body bracket-area" id="bracket-area"></div>

  <footer class="board-footer" style="justify-content:space-between">
    <div class="legend" id="legend"></div>
    <span class="tagline">Have fun. Build community. Give back.</span>
  </footer>
</div>

<script>
let playerNameMap = {};

function nameOf(id) { return id ? (playerNameMap[id] || '???') : ''; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function elimSidebar(sections) {
  const hasAny = sections.some(s => s.names.length > 0);
  let html = `<div class="bracket-sidebar"><div class="elim-title">Eliminated</div>`;
  if (!hasAny) {
    html += `<div class="elim-empty">None yet</div>`;
  } else {
    sections.forEach(s => {
      if (!s.names.length) return;
      html += `<div class="elim-section">${s.label}</div>`;
      s.names.forEach(n => { html += `<div class="elim-name">${esc(n)}</div>`; });
    });
  }
  return html + `</div>`;
}

function championMain(label, name) {
  return `<div class="bracket-main"><div class="champion-state">
    <div class="champ-label">${label}</div>
    <div class="champ-name">${name || '—'}</div>
  </div></div>`;
}

function renderMurderball(b) {
  const rounds = b.rounds;
  const activeIdx = rounds.findIndex(r => !r.complete);
  const done = activeIdx === -1;

  const completedRounds = done ? rounds : rounds.slice(0, activeIdx);
  const sections = completedRounds.map((round, ri) => {
    const names = round.heats.flatMap(h => {
      const ids = h.eliminatedPlayerIds || (h.eliminatedPlayerId ? [h.eliminatedPlayerId] : []);
      return ids.map(id => nameOf(id));
    });
    return { label: `After Round ${ri + 1}`, names };
  });

  if (done) {
    return championMain('Champion', b.championPlayerId ? esc(nameOf(b.championPlayerId)) : '') + elimSidebar(sections);
  }

  const round = rounds[activeIdx];
  let main = `<div class="bracket-main">
    <div class="round-title">Round ${activeIdx + 1} <span class="round-of">of ${rounds.length}</span></div>
    <div class="heat-row">`;

  round.heats.forEach((h, hi) => {
    const elim = h.eliminatedPlayerIds || (h.eliminatedPlayerId ? [h.eliminatedPlayerId] : []);
    const anyOut = elim.length > 0;
    main += `<div class="card-block${h.bye ? ' is-bye' : ''}">
      <div class="card-header">${h.bye ? 'Bye' : `Heat ${hi + 1}`}</div>`;
    h.playerIds.forEach(pid => {
      let cls = h.bye ? 'bye' : elim.includes(pid) ? 'loser' : (anyOut || round.complete) ? 'winner' : '';
      main += `<div class="row"><span class="pname ${cls}">${esc(nameOf(pid))}</span></div>`;
    });
    main += `</div>`;
  });

  return main + `</div></div>` + elimSidebar(sections);
}

function renderDerby(b) {
  const rounds = b.rounds;
  const totalRounds = rounds.length;

  function rname(i) {
    if (i === totalRounds - 1) return 'Final';
    if (i === totalRounds - 2) return 'Semifinals';
    if (i === totalRounds - 3) return 'Quarters';
    return `Round ${i + 1}`;
  }

  const activeIdx = rounds.findIndex(r => r.matchups.some(m => !m.winnerPlayerId && !m.bye));
  const done = activeIdx === -1;

  const completedRounds = done ? rounds : rounds.slice(0, activeIdx);
  const sections = completedRounds.map((round, ri) => {
    const names = round.matchups.flatMap(m => {
      if (!m.winnerPlayerId) return [];
      const loser = [m.player1, m.player2].find(p => p.playerId && p.playerId !== m.winnerPlayerId);
      return loser ? [nameOf(loser.playerId)] : [];
    });
    return { label: `After ${rname(ri)}`, names };
  });

  if (done) {
    return championMain('Derby Champion', b.championPlayerId ? esc(nameOf(b.championPlayerId)) : '') + elimSidebar(sections);
  }

  const round = rounds[activeIdx];
  let main = `<div class="bracket-main">
    <div class="round-title">${rname(activeIdx)}</div>
    <div class="heat-row">`;

  round.matchups.forEach(m => {
    const p1 = m.player1, p2 = m.player2;
    const winId = m.winnerPlayerId;

    function row(p) {
      const name = p.playerId ? nameOf(p.playerId) : null;
      let cls = !name ? (m.bye ? 'bye' : 'tbd') : winId === p.playerId ? 'winner' : winId ? 'loser' : '';
      const scoreCls = winId === p.playerId ? 'score winner' : 'score';
      return `<div class="row">
        <span class="seed">${p.seed || ''}</span>
        <span class="pname ${cls}">${name ? esc(name) : (m.bye ? 'BYE' : 'TBD')}</span>
        <span class="${scoreCls}">${p.score != null ? p.score : ''}</span>
      </div>`;
    }

    main += `<div class="card-block ${round.isFinal ? 'is-final' : ''}">
      <div class="card-header">${round.isFinal ? 'Final · 7 throws' : 'Best Throw'}</div>
      ${row(p1)}${row(p2)}
    </div>`;
  });

  return main + `</div></div>` + elimSidebar(sections);
}

function legendFor(mode) {
  const items = [
    `<div class="legend-item"><div class="dot dot-orange"></div>Advanced</div>`,
    `<div class="legend-item"><div class="dot dot-muted"></div>Eliminated</div>`,
  ];
  if (mode === 'murderball') items.push(`<div class="legend-item"><div class="dot dot-teal"></div>Bye</div>`);
  return items.join('');
}

async function refresh() {
  try {
    const [bRes, pRes] = await Promise.all([
      fetch('/api/bracket', { cache: 'no-store' }).then(r => r.json()),
      fetch('/api/players', { cache: 'no-store' }).then(r => r.json())
    ]);
    playerNameMap = Object.fromEntries(pRes.map(p => [p.id, p.name]));

    const titleEl = document.getElementById('mode-title');
    const subEl = document.getElementById('mode-subtitle');
    const dayEl = document.getElementById('day-num');
    const area = document.getElementById('bracket-area');
    const legend = document.getElementById('legend');

    if (bRes.mode === 'derby') {
      titleEl.textContent = 'Home Run Derby';
      subEl.textContent = 'Day 6 — Killshot Bracket';
      dayEl.textContent = '6';
    } else {
      titleEl.textContent = 'Murderball';
      subEl.textContent = 'Day 4 — Heat Elimination';
      dayEl.textContent = '4';
    }
    legend.innerHTML = legendFor(bRes.mode);

    if (!bRes.generated || !bRes.rounds.length) {
      area.innerHTML = '<div class="empty-state">Waiting for bracket…</div>';
      return;
    }

    area.innerHTML = bRes.mode === 'derby' ? renderDerby(bRes) : renderMurderball(bRes);
  } catch (e) {
    console.error(e);
  }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
