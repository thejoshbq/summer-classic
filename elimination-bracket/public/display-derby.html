<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home Run Derby — Summer Classic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }

  .shell {
    width: 100vw;
    aspect-ratio: 16/9;
    background: #114566;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: 'Oswald', sans-serif;
  }

  .header {
    background: #0d3650;
    border-bottom: 3px solid #F28F16;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left .venue { font-size: 11px; color: #196A73; letter-spacing: 3px; text-transform: uppercase; }
  .header-left .mode-title { font-size: 22px; font-weight: 700; color: #F28F16; text-transform: uppercase; line-height: 1.1; }
  .header-left .subtitle { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
  .day-badge { background: #196A73; border-radius: 8px; padding: 8px 16px; text-align: center; }
  .day-badge .day-label { font-size: 9px; color: rgba(255,255,255,0.6); letter-spacing: 2px; text-transform: uppercase; display: block; }
  .day-badge .day-num { font-size: 28px; font-weight: 700; color: #fff; line-height: 1; }

  .bracket-area {
    flex: 1;
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 20px 24px 16px;
    overflow-x: auto;
    gap: 0;
    min-height: 0;
    position: relative;
  }

  /* Each round column */
  .round-col {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
    flex-shrink: 0;
    width: 180px;
    align-self: stretch;
    position: relative;
  }
  .round-col-inner {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    width: 100%;
    height: 100%;
    gap: 0;
  }
  .round-label {
    font-size: 10px;
    color: #196A73;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
  }
  .matchup-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    position: relative;
  }

  /* Matchup card */
  .matchup-card {
    background: #0d3650;
    border: 1px solid rgba(25,106,115,0.3);
    border-radius: 6px;
    overflow: hidden;
    width: 168px;
  }
  .matchup-card.is-final { border: 2px solid #F28F16; }

  .player-row {
    display: flex;
    align-items: center;
    border-bottom: 1px solid rgba(25,106,115,0.15);
  }
  .player-row:last-child { border-bottom: none; }
  .seed-col {
    font-size: 10px;
    color: #196A73;
    padding: 6px 7px;
    border-right: 1px solid rgba(25,106,115,0.2);
    min-width: 26px;
    text-align: center;
    font-family: 'Oswald', sans-serif;
  }
  .player-name {
    flex: 1;
    padding: 6px 8px;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-name.winner { color: #F28F16; }
  .player-name.loser { color: rgba(255,255,255,0.25); text-decoration: line-through; }
  .player-name.bye { color: #196A73; font-style: italic; }
  .player-name.tbd { color: rgba(255,255,255,0.2); }
  .score-col {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 8px;
    min-width: 28px;
    text-align: right;
    color: rgba(255,255,255,0.5);
  }
  .score-col.winner-score { color: #F28F16; }

  /* Connector lines between rounds */
  .connector-col {
    width: 28px;
    flex-shrink: 0;
    align-self: stretch;
    position: relative;
  }

  /* Champion card */
  .champion-card {
    background: #0d3650;
    border: 2px solid #F28F16;
    border-radius: 6px;
    overflow: hidden;
    width: 168px;
    flex-shrink: 0;
    align-self: center;
  }
  .champion-label {
    font-size: 9px;
    color: #F28F16;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 10px;
    text-align: center;
    border-bottom: 1px solid rgba(242,143,22,0.3);
  }
  .champion-name {
    font-size: 17px;
    font-weight: 700;
    color: #F28F16;
    text-align: center;
    padding: 10px;
    text-transform: uppercase;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .footer {
    background: #0d3650;
    border-top: 1px solid rgba(25,106,115,0.3);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .legend { display: flex; gap: 16px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-orange { background: #F28F16; }
  .dot-muted { background: rgba(255,255,255,0.25); }
  .tagline { font-family: 'Barlow Condensed', sans-serif; font-style: italic; color: rgba(255,255,255,0.2); font-size: 10px; }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-left">
      <div class="venue">Lumber Jill's</div>
      <div class="mode-title">Home Run Derby</div>
      <div class="subtitle">Day 6 — Killshot Bracket</div>
    </div>
    <div class="day-badge">
      <span class="day-label">Day</span>
      <span class="day-num">6</span>
    </div>
  </div>

  <div class="bracket-area" id="bracketArea">
    <div style="color:rgba(255,255,255,0.2);font-family:'Oswald',sans-serif;font-size:14px;margin:auto">Waiting for bracket...</div>
  </div>

  <div class="footer">
    <div class="legend">
      <div class="legend-item"><div class="dot dot-orange"></div>Advanced</div>
      <div class="legend-item"><div class="dot dot-muted"></div>Eliminated</div>
    </div>
    <div class="tagline">Have fun. Build community. Give back.</div>
  </div>
</div>

<script>
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function roundName(i, total) {
  if (i === total - 1) return 'Final';
  if (i === total - 2) return 'Semifinals';
  if (i === total - 3) return 'Quarterfinals';
  return `Round ${i + 1}`;
}

function renderBracket(state) {
  const area = document.getElementById('bracketArea');
  if (!state.generated || !state.rounds.length || state.mode !== 'derby') {
    area.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-family:\'Oswald\',sans-serif;font-size:14px;margin:auto">Waiting for bracket...</div>';
    return;
  }

  const rounds = state.rounds;
  const totalRounds = rounds.length;

  // Build round columns with SVG connectors between them
  let html = '';

  rounds.forEach((round, ri) => {
    const isFinal = round.isFinal;
    const matchupCount = round.matchups.length;

    html += `<div class="round-col" style="--matchup-count:${matchupCount}">
      <div class="round-label" style="position:relative;margin-bottom:8px">${roundName(ri, totalRounds)}</div>
      <div class="round-col-inner" style="flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:0">`;

    round.matchups.forEach((m, mi) => {
      const p1 = m.player1, p2 = m.player2;

      function playerCls(p, other) {
        if (!p.name) return 'tbd';
        if (m.winner === p.name) return 'winner';
        if (m.winner && m.winner !== p.name) return 'loser';
        if (m.bye && p.name) return 'bye';
        return '';
      }
      function scoreCls(p) {
        return m.winner === p.name ? 'winner-score' : '';
      }

      html += `<div class="matchup-wrapper">
        <div class="matchup-card${isFinal ? ' is-final' : ''}">
          <div class="player-row">
            <div class="seed-col">${p1.seed || ''}</div>
            <div class="player-name ${playerCls(p1, p2)}">${p1.name ? esc(p1.name) : 'TBD'}</div>
            <div class="score-col ${scoreCls(p1)}">${p1.score != null ? p1.score : ''}</div>
          </div>
          <div class="player-row">
            <div class="seed-col">${p2.seed || ''}</div>
            <div class="player-name ${playerCls(p2, p1)}">${p2.name ? esc(p2.name) : 'TBD'}</div>
            <div class="score-col ${scoreCls(p2)}">${p2.score != null ? p2.score : ''}</div>
          </div>
        </div>
      </div>`;
    });

    html += `</div></div>`;

    // Connector SVG between rounds
    if (ri < totalRounds - 1) {
      const nextCount = rounds[ri + 1].matchups.length;
      const isToFinal = ri === totalRounds - 2;
      html += `<div class="connector-col" data-from="${matchupCount}" data-to="${nextCount}" data-final="${isToFinal}"></div>`;
    }
  });

  // Champion card
  html += `<div class="connector-col connector-to-champ" style="width:20px"></div>`;
  html += `<div class="champion-card">
    <div class="champion-label">Derby Champion</div>
    <div class="champion-name">${state.champion ? esc(state.champion) : '&nbsp;'}</div>
  </div>`;

  area.innerHTML = html;

  // Draw connector lines via SVG overlay
  requestAnimationFrame(() => drawConnectors(rounds));
}

function drawConnectors(rounds) {
  const area = document.getElementById('bracketArea');
  // Remove old SVG overlays
  area.querySelectorAll('.connector-svg').forEach(el => el.remove());

  const connectorCols = area.querySelectorAll('.connector-col');
  const roundCols = area.querySelectorAll('.round-col');

  connectorCols.forEach((col, ci) => {
    if (col.classList.contains('connector-to-champ')) {
      // Single line from last round to champion
      const lastRoundCol = roundCols[roundCols.length - 1];
      const lastWrapper = lastRoundCol.querySelector('.matchup-wrapper');
      if (!lastWrapper) return;
      const lastCard = lastWrapper.querySelector('.matchup-card');
      if (!lastCard) return;
      const colRect = col.getBoundingClientRect();
      const areaRect = area.getBoundingClientRect();
      const cardRect = lastCard.getBoundingClientRect();
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.classList.add('connector-svg');
      svg.style.cssText = `position:absolute;top:0;left:0;width:${areaRect.width}px;height:${areaRect.height}px;pointer-events:none;overflow:visible;`;
      svg.setAttribute('width', areaRect.width);
      svg.setAttribute('height', areaRect.height);
      const x1 = cardRect.right - areaRect.left;
      const y1 = cardRect.top + cardRect.height / 2 - areaRect.top;
      const x2 = colRect.right - areaRect.left;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y1);
      line.setAttribute('stroke', 'rgba(242,143,22,0.6)');
      line.setAttribute('stroke-width', '1');
      svg.appendChild(line);
      area.appendChild(svg);
      return;
    }

    const fromCol = roundCols[ci];
    const toCol = roundCols[ci + 1];
    if (!fromCol || !toCol) return;

    const fromWrappers = fromCol.querySelectorAll('.matchup-wrapper');
    const toWrappers = toCol.querySelectorAll('.matchup-wrapper');
    const colRect = col.getBoundingClientRect();
    const areaRect = area.getBoundingClientRect();
    const isToFinal = col.dataset.final === 'true';
    const lineColor = isToFinal ? 'rgba(242,143,22,0.6)' : 'rgba(25,106,115,0.4)';

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('connector-svg');
    svg.style.cssText = `position:absolute;top:0;left:0;width:${areaRect.width}px;height:${areaRect.height}px;pointer-events:none;overflow:visible;`;
    svg.setAttribute('width', areaRect.width);
    svg.setAttribute('height', areaRect.height);

    toWrappers.forEach((toW, ti) => {
      const srcA = fromWrappers[ti * 2];
      const srcB = fromWrappers[ti * 2 + 1];
      if (!srcA || !srcB || !toW) return;

      const cardA = srcA.querySelector('.matchup-card');
      const cardB = srcB.querySelector('.matchup-card');
      const cardT = toW.querySelector('.matchup-card');
      if (!cardA || !cardB || !cardT) return;

      const ra = cardA.getBoundingClientRect();
      const rb = cardB.getBoundingClientRect();
      const rt = cardT.getBoundingClientRect();

      const x1 = ra.right - areaRect.left;
      const ya = ra.top + ra.height / 2 - areaRect.top;
      const yb = rb.top + rb.height / 2 - areaRect.top;
      const x2 = rt.left - areaRect.left;
      const yt = rt.top + rt.height / 2 - areaRect.top;
      const midX = (x1 + x2) / 2;

      // Elbow path: right from card A → mid → right from card B → mid → to target
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${x1},${ya} H${midX} V${yb} H${x1} M${midX},${ya} V${yb} M${midX},${(ya+yb)/2} H${x2},${yt}`);
      // Simpler: standard elbow
      const p = `M${x1},${ya} H${midX} V${yt} H${x2}`;
      const pB = `M${x1},${yb} H${midX}`;
      path.setAttribute('d', p);
      path.setAttribute('stroke', lineColor);
      path.setAttribute('stroke-width', '1');
      path.setAttribute('fill', 'none');
      svg.appendChild(path);

      const pathB = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      pathB.setAttribute('d', pB);
      pathB.setAttribute('stroke', lineColor);
      pathB.setAttribute('stroke-width', '1');
      pathB.setAttribute('fill', 'none');
      svg.appendChild(pathB);
    });

    area.appendChild(svg);
  });
}

let lastJson = '';
async function poll() {
  try {
    const res = await fetch('/api/bracket');
    const state = await res.json();
    const json = JSON.stringify(state);
    if (json !== lastJson) { lastJson = json; renderBracket(state); }
  } catch(e) {}
}

poll();
setInterval(poll, 5000);
window.addEventListener('resize', () => {
  if (lastJson) renderBracket(JSON.parse(lastJson));
});
</script>
</body>
</html>
