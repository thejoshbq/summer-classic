<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Murderball — Summer Classic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }

  .shell {
    width: 100vw;
    aspect-ratio: 16/9;
    background: #114566;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: 'Oswald', sans-serif;
  }

  /* HEADER */
  .header {
    background: #0d3650;
    border-bottom: 3px solid #F28F16;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left .venue { font-size: 11px; color: #196A73; letter-spacing: 3px; text-transform: uppercase; }
  .header-left .mode-title { font-size: 22px; font-weight: 700; color: #F28F16; text-transform: uppercase; line-height: 1.1; }
  .header-left .subtitle { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
  .day-badge {
    background: #196A73;
    border-radius: 8px;
    padding: 8px 16px;
    text-align: center;
  }
  .day-badge .day-label { font-size: 9px; color: rgba(255,255,255,0.6); letter-spacing: 2px; text-transform: uppercase; display: block; }
  .day-badge .day-num { font-size: 28px; font-weight: 700; color: #fff; line-height: 1; }

  /* BRACKET */
  .bracket-area {
    flex: 1;
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 20px 24px 16px;
    overflow-x: auto;
    gap: 0;
    min-height: 0;
  }

  .round-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    min-width: 160px;
  }
  .round-label {
    font-size: 10px;
    color: #196A73;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 10px;
  }
  .heats-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  /* Heat card */
  .heat-card {
    background: #0d3650;
    border: 1px solid rgba(25,106,115,0.3);
    border-radius: 6px;
    overflow: hidden;
    width: 150px;
  }
  .heat-label {
    font-size: 9px;
    color: #196A73;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-bottom: 1px solid rgba(25,106,115,0.2);
  }
  .heat-player-row {
    padding: 5px 10px;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    color: #fff;
    border-bottom: 1px solid rgba(25,106,115,0.1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .heat-player-row:last-child { border-bottom: none; }
  .heat-player-row.eliminated { color: rgba(255,255,255,0.25); text-decoration: line-through; }
  .heat-player-row.advanced { color: #F28F16; }
  .heat-player-row.bye { color: #196A73; font-style: italic; }

  /* Connector */
  .connector {
    width: 32px;
    flex-shrink: 0;
    align-self: stretch;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .connector::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: rgba(25,106,115,0.4);
  }
  .connector.to-champion::after { background: rgba(242,143,22,0.6); }

  /* Champion card */
  .champion-card {
    background: #0d3650;
    border: 2px solid #F28F16;
    border-radius: 6px;
    overflow: hidden;
    width: 150px;
    flex-shrink: 0;
  }
  .champion-label {
    font-size: 9px;
    color: #F28F16;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 10px;
    text-align: center;
    border-bottom: 1px solid rgba(242,143,22,0.3);
  }
  .champion-name {
    font-size: 17px;
    font-weight: 700;
    color: #F28F16;
    text-align: center;
    padding: 10px;
    text-transform: uppercase;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* FOOTER */
  .footer {
    background: #0d3650;
    border-top: 1px solid rgba(25,106,115,0.3);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .legend { display: flex; gap: 16px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-orange { background: #F28F16; }
  .dot-muted { background: rgba(255,255,255,0.25); }
  .dot-teal { background: #196A73; }
  .tagline { font-family: 'Barlow Condensed', sans-serif; font-style: italic; color: rgba(255,255,255,0.2); font-size: 10px; }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-left">
      <div class="venue">Lumber Jill's</div>
      <div class="mode-title">Murderball</div>
      <div class="subtitle">Day 4 — Heat Elimination</div>
    </div>
    <div class="day-badge">
      <span class="day-label">Day</span>
      <span class="day-num">4</span>
    </div>
  </div>

  <div class="bracket-area" id="bracketArea">
    <div style="color:rgba(255,255,255,0.2);font-family:'Oswald',sans-serif;font-size:14px;margin:auto">Waiting for bracket...</div>
  </div>

  <div class="footer">
    <div class="legend">
      <div class="legend-item"><div class="dot dot-orange"></div>Advanced</div>
      <div class="legend-item"><div class="dot dot-muted"></div>Eliminated</div>
      <div class="legend-item"><div class="dot dot-teal"></div>Bye</div>
    </div>
    <div class="tagline">Have fun. Build community. Give back.</div>
  </div>
</div>

<script>
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderBracket(state) {
  const area = document.getElementById('bracketArea');
  if (!state.generated || !state.rounds.length) {
    area.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-family:\'Oswald\',sans-serif;font-size:14px;margin:auto">Waiting for bracket...</div>';
    return;
  }

  // Compute survivors per round to know who advanced
  const survivorsPerRound = [];
  for (let ri = 0; ri < state.rounds.length; ri++) {
    const r = state.rounds[ri];
    const survivors = r.heats.flatMap(h =>
      h.bye ? h.players : h.players.filter(p => p !== h.eliminated)
    );
    survivorsPerRound.push(new Set(survivors));
  }

  let html = '';
  state.rounds.forEach((round, ri) => {
    // Connector before this col (except first)
    if (ri > 0) {
      const isFinal = ri === state.rounds.length - 1;
      html += `<div class="connector${isFinal ? ' to-champion' : ''}"></div>`;
    }

    const label = ri === 0 ? 'Round 1' : `Round ${ri + 1}`;
    html += `<div class="round-col">
      <div class="round-label">${label}</div>
      <div class="heats-stack">`;

    round.heats.forEach((heat, hi) => {
      html += `<div class="heat-card">
        <div class="heat-label">${heat.bye ? 'Bye' : `Heat ${hi + 1}`}</div>`;
      heat.players.forEach(p => {
        let cls = '';
        if (heat.bye) cls = 'bye';
        else if (heat.eliminated === p) cls = 'eliminated';
        else if (heat.eliminated !== null || round.complete) cls = 'advanced';
        html += `<div class="heat-player-row ${cls}">${esc(p)}</div>`;
      });
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  // Final connector + champion card
  html += `<div class="connector to-champion"></div>`;
  html += `<div class="champion-card">
    <div class="champion-label">Champion</div>
    <div class="champion-name">${state.champion ? esc(state.champion) : '&nbsp;'}</div>
  </div>`;

  area.innerHTML = html;
}

let lastJson = '';
async function poll() {
  try {
    const res = await fetch('/api/bracket');
    const state = await res.json();
    const json = JSON.stringify(state);
    if (json !== lastJson) { lastJson = json; renderBracket(state); }
  } catch(e) {}
}

poll();
setInterval(poll, 5000);
</script>
</body>
</html>
